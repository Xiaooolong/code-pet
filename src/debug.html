<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Code Pet - Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #ccc;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      padding: 32px 24px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 8px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .card:hover { border-color: #444; background: #1e1e1e; }
    .card.active { border-color: #e0e0e0; background: #222; }
    .card .label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card.active .label { color: #fff; }
    .card svg { display: block; margin: 0 auto; }
    .card .desc {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }
    .controls {
      max-width: 720px;
      margin: 24px auto;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }
    .controls button {
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s ease;
    }
    .controls button:hover { background: #252525; color: #ddd; border-color: #444; }
    .controls button.active { background: #333; color: #fff; border-color: #555; }
    .speed-label {
      font-size: 12px;
      color: #555;
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: center;
    }
    .divider {
      width: 1px;
      height: 20px;
      background: #2a2a2a;
      margin: 0 4px;
    }
    .preview-area {
      max-width: 720px;
      margin: 24px auto;
      text-align: center;
    }
    .preview-area svg {
      background: #141414;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
    }
    .preview-label {
      font-size: 13px;
      margin-bottom: 10px;
      color: #666;
      font-weight: 500;
    }
    .preview-label span { color: #fff; }
    .cmd-hint {
      max-width: 720px;
      margin: 20px auto;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .cmd-hint code { color: #888; }
  </style>
</head>
<body>
  <h1>Code Pet</h1>
  <div class="subtitle">Animation Debug Panel</div>

  <div class="grid" id="grid"></div>

  <div class="controls">
    <button onclick="toggleAutoPlay()" id="btn-auto">Auto Play</button>
    <button onclick="doToggleTheme()" id="btn-theme">Theme: Dark</button>
    <div class="divider"></div>
    <button onclick="speedDown()">-</button>
    <span class="speed-label" id="speed-label">1.0x</span>
    <button onclick="speedUp()">+</button>
  </div>

  <div class="preview-area">
    <div class="preview-label">Preview: <span id="current-state-label">idle</span></div>
    <svg id="preview-svg" width="200" height="240" viewBox="0 0 150 180"></svg>
  </div>

  <div class="cmd-hint">
    Trigger state: <code>claude-pet-hook.ps1 <span id="cmd-state">idle</span></code>
  </div>

  <script type="module">
    import { renderPose, setFrameSeed } from './renderer.js';
    import { renderDecorations } from './decorations.js';
    import { toggleTheme, getTheme } from './theme.js';

    const STATES = ['idle', 'thinking', 'coding', 'reading', 'running', 'celebrate', 'error', 'user_typing'];
    const STATE_LABELS = {
      idle: 'Sipping tea',
      thinking: 'Head scratch',
      coding: 'Typing away',
      reading: 'Book worm',
      running: 'On the move',
      celebrate: 'Party time',
      error: 'Uh oh',
      user_typing: 'Catching input',
    };

    let selectedState = 'idle';
    let animTime = 0;
    let speed = 1.0;
    let autoPlay = false;
    let autoIdx = 0;
    let autoTimer = null;

    const grid = document.getElementById('grid');
    const previewSvg = document.getElementById('preview-svg');
    const stateLabel = document.getElementById('current-state-label');
    const cmdState = document.getElementById('cmd-state');

    // Create grid cards
    const cards = {};
    STATES.forEach(state => {
      const card = document.createElement('div');
      card.className = 'card' + (state === selectedState ? ' active' : '');
      card.innerHTML = `
        <div class="label">${state.replace('_', ' ')}</div>
        <svg width="120" height="140" viewBox="0 0 150 180"></svg>
        <div class="desc">${STATE_LABELS[state]}</div>
      `;
      card.addEventListener('click', () => selectState(state));
      grid.appendChild(card);
      cards[state] = { el: card, svg: card.querySelector('svg') };
    });

    function selectState(state) {
      Object.values(cards).forEach(c => c.el.classList.remove('active'));
      cards[state].el.classList.add('active');
      selectedState = state;
      stateLabel.textContent = state;
      cmdState.textContent = state;
    }

    // Animation loop
    let lastTime = performance.now();
    function animate(now) {
      const dt = (now - lastTime) / 1000 * speed;
      lastTime = now;
      animTime += dt;

      setFrameSeed(animTime);

      // Render all thumbnails
      STATES.forEach(state => {
        const svg = cards[state].svg;
        svg.innerHTML = renderPose(state, animTime) + renderDecorations(state, animTime);
      });

      // Render large preview
      previewSvg.innerHTML = renderPose(selectedState, animTime) + renderDecorations(selectedState, animTime);

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // Auto-play: cycle through states
    window.toggleAutoPlay = function() {
      autoPlay = !autoPlay;
      const btn = document.getElementById('btn-auto');
      btn.textContent = autoPlay ? 'Stop' : 'Auto Play';
      btn.classList.toggle('active', autoPlay);
      if (autoPlay) {
        autoIdx = STATES.indexOf(selectedState);
        autoTimer = setInterval(() => {
          autoIdx = (autoIdx + 1) % STATES.length;
          selectState(STATES[autoIdx]);
        }, 3000);
      } else {
        clearInterval(autoTimer);
      }
    };

    window.speedUp = function() {
      speed = Math.min(speed + 0.5, 5);
      document.getElementById('speed-label').textContent = speed.toFixed(1) + 'x';
    };

    window.speedDown = function() {
      speed = Math.max(speed - 0.5, 0.5);
      document.getElementById('speed-label').textContent = speed.toFixed(1) + 'x';
    };

    window.doToggleTheme = function() {
      toggleTheme();
      const t = getTheme();
      document.getElementById('btn-theme').textContent = `Theme: ${t === 'dark' ? 'Dark' : 'Light'}`;
      document.body.style.background = t === 'dark' ? '#0f0f0f' : '#f5f5f5';
      document.body.style.color = t === 'dark' ? '#ccc' : '#333';
      document.querySelectorAll('.card').forEach(c => {
        c.style.background = t === 'dark' ? '#1a1a1a' : '#fff';
        c.style.borderColor = t === 'dark' ? '#2a2a2a' : '#ddd';
      });
      document.querySelector('.preview-area svg').style.background = t === 'dark' ? '#141414' : '#fafafa';
    };
  </script>
</body>
</html>
